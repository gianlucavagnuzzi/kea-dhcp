      //   "dhcp6-client-id": "hardware-addr-01:00:80:a2:55:67",
      //   "ip-addresses": ["3ffe:501:ffff:100::4321"]
      // }
    ],

    "loggers": [
      {
        "name": "kea-dhcp6",
        "output_options": [
          {
            "output": "stdout",
            "pattern": "%d{%Y-%m-%d %H:%M:%S} %m"
          }
        ],
        "severity": "INFO"
      }
    ]
  }
}
