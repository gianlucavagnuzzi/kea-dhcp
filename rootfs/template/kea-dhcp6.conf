{
  "Dhcp6": {
    "interfaces-config": {
      "interfaces": [ "eth0" ]
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/leases6.csv"
    },

    "valid-lifetime": 2592000,
    "preferred-lifetime": 604800,
    "renew-timer": 3600,
    "rebind-timer": 7200,

    "subnet6": [
      // {
      //   "id": 1,
      //   "subnet": "3ffe:501:ffff:100::/64",
